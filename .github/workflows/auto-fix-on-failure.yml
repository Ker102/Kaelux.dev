name: Auto-fix on CI Failure

# Trigger when the CI/CD Pipeline workflow completes
# NOTE: workflow_run requires exact workflow names, not globs
on:
  workflow_run:
    workflows: ["CI/CD Pipeline"]
    types: [completed]

permissions:
  issues: write
  actions: read
  contents: read

jobs:
  create-fix-issue:
    name: Create Auto-fix Issue
    runs-on: ubuntu-latest

    # Only run if the workflow failed AND it's on the main branch
    # This prevents infinite loops from Copilot's own PR branches
    if: |
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.head_branch == 'main'

    steps:
      - name: Check for existing auto-fix issues
        id: check-existing
        uses: actions/github-script@v7
        with:
          script: |
            // Search for open issues with the auto-fix label
            const { data: existingIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'auto-fix',
              per_page: 100
            });

            // Check if any existing issue references this workflow run
            const workflowRunId = context.payload.workflow_run.id;
            const duplicateIssue = existingIssues.find(issue =>
              issue.body && issue.body.includes(`run/${workflowRunId}`)
            );

            if (duplicateIssue) {
              console.log(`Found duplicate issue #${duplicateIssue.number}, skipping creation`);
              core.setOutput('skip', 'true');
            } else {
              console.log('No duplicate issue found, will create new issue');
              core.setOutput('skip', 'false');
            }

      - name: Create GitHub issue for Copilot
        if: steps.check-existing.outputs.skip == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const workflowRun = context.payload.workflow_run;
            const shortSha = workflowRun.head_sha.substring(0, 7);

            // Create issue with detailed information for Copilot
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🤖 Auto-fix: CI failure in ${workflowRun.name} (${shortSha})`,
              body: `## CI Failure Detected

            A CI workflow has failed on the \`main\` branch. Please analyze the failure logs, identify the root cause, and implement a fix.

            ### Failure Details
            - **Workflow:** ${workflowRun.name}
            - **Run URL:** ${workflowRun.html_url}
            - **Commit SHA:** ${workflowRun.head_sha}
            - **Branch:** ${workflowRun.head_branch}
            - **Triggered by:** ${workflowRun.triggering_actor.login}
            - **Event:** ${workflowRun.event}

            ### Instructions for Copilot
            1. Review the workflow run logs at the URL above
            2. Identify the root cause of the failure
            3. Implement a fix with minimal changes
            4. Open a PR with the fix
            5. Ensure all CI checks pass on your PR

            The fix will be automatically evaluated for confidence and may be auto-merged if it meets the threshold.

            ### Related Resources
            - [Workflow Runs](https://github.com/${context.repo.owner}/${context.repo.repo}/actions)
            - [Recent Commits](https://github.com/${context.repo.owner}/${context.repo.repo}/commits/main)`,
              labels: ['auto-fix', 'copilot'],
              assignees: ['copilot']
            });

            console.log(`Created issue #${issue.data.number}: ${issue.data.html_url}`);
